buildscript {
    repositories {
        mavenCentral()
        maven {
            name = "forge"
            url = "https://maven.minecraftforge.net/"  // ← ЗАМЕНЕНО: новый URL
        }
    }
    dependencies {
        classpath 'net.minecraftforge.gradle:ForgeGradle:1.2-SNAPSHOT'
    }
}

apply plugin: 'forge'

version = "1.0"
group = "com.yoursingularities"
archivesBaseName = "yoursingularities"

// ВАЖНО: совместимость с Java 8+
sourceCompatibility = targetCompatibility = 1.8

minecraft {
    version = "1.7.10-10.13.4.1614-1.7.10"
    runDir = "eclipse"
    
    // Замена старого MCP на стабильную версию
    mappings = "stable_12"
}

repositories {
    maven {
        name = "chickenbones"
        url = "https://chickenbones.net/maven"
    }
    // Добавляем резервный репозиторий
    maven {
        name = "CurseMaven"
        url = "https://www.cursemaven.com"
    }
}

dependencies {
    provided "codechicken:NotEnoughItems:1.7.10-1.0.5.120:dev"
    provided "codechicken:CodeChickenCore:1.7.10-1.0.7.47:dev"
}

// Отключаем строгую проверку, чтобы избежать ошибок с устаревшими зависимостями
configurations.all {
    resolutionStrategy {
        force 'com.google.code.findbugs:jsr305:3.0.2'
    }
}

processResources {
    inputs.property "version", project.version
    inputs.property "mcversion", project.minecraft.version
    from(sourceSets.main.resources.srcDirs) {
        include 'mcmod.info'
        expand 'version':project.version, 'mcversion':project.minecraft.version
    }
    from(sourceSets.main.resources.srcDirs) {
        exclude 'mcmod.info'
    }
}
