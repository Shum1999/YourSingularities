// ========== FIX FOR MERGEJARS TASK ==========
import java.nio.file.Files
import java.nio.file.StandardCopyOption

// Создаем необходимые файлы для mergeJars
task setupMinecraftFiles {
    doLast {
        // Создаем директории
        def clientDir = new File(gradle.gradleUserHomeDir, "caches/minecraft/net/minecraft/minecraft/1.7.10")
        def serverDir = new File(gradle.gradleUserHomeDir, "caches/minecraft/net/minecraft/minecraft_server/1.7.10")
        clientDir.mkdirs()
        serverDir.mkdirs()
        
        def clientTarget = new File(clientDir, "minecraft-1.7.10.jar")
        def serverTarget = new File(serverDir, "minecraft_server-1.7.10.jar")
        
        // Ищем исходный JAR
        def sourceJar = null
        
        // Проверяем локальную папку cache
        def localCacheJar = file("cache/1.7.10.jar")
        if (localCacheJar.exists()) {
            sourceJar = localCacheJar
            println "Found JAR in cache/1.7.10.jar"
        }
        
        // Проверяем build/mcp/minecraft/client
        def buildClientJar = file("build/mcp/minecraft/client/minecraft.jar")
        if (!sourceJar && buildClientJar.exists()) {
            sourceJar = buildClientJar
            println "Found JAR in build/mcp/minecraft/client/minecraft.jar"
        }
        
        // Скачиваем если не нашли
        if (!sourceJar) {
            println "Downloading Minecraft JAR from Mojang..."
            def url = "https://launcher.mojang.com/v1/objects/4d2426c450addf63dee0d0735008caaef1ce496f/client.jar"
            sourceJar = file("cache/downloaded.jar")
            sourceJar.parentFile.mkdirs()
            new URL(url).withInputStream { input ->
                Files.copy(input, sourceJar.toPath(), StandardCopyOption.REPLACE_EXISTING)
            }
        }
        
        // Копируем в нужные места
        if (sourceJar && sourceJar.exists()) {
            println "Copying to ${clientTarget}"
            Files.copy(sourceJar.toPath(), clientTarget.toPath(), StandardCopyOption.REPLACE_EXISTING)
            
            println "Copying to ${serverTarget}"
            Files.copy(sourceJar.toPath(), serverTarget.toPath(), StandardCopyOption.REPLACE_EXISTING)
            
            println "✓ Minecraft files prepared successfully"
        } else {
            throw new GradleException("Could not find or download Minecraft JAR")
        }
    }
}

// Также перехватываем getVersionJson (он пытается скачать JSON)
tasks.getVersionJson {
    enabled = false
    doLast {
        def jsonDir = new File(gradle.gradleUserHomeDir, "caches/minecraft/net/minecraft/minecraft/1.7.10")
        jsonDir.mkdirs()
        def jsonFile = new File(jsonDir, "1.7.10.json")
        
        if (!jsonFile.exists()) {
            println "Downloading version JSON..."
            def url = "https://launchermeta.mojang.com/mc/game/version_manifest.json"
            // Создаем простой JSON для 1.7.10
            jsonFile.text = '{"id":"1.7.10","type":"release","time":"2014-06-26T08:14:00+00:00","releaseTime":"2014-06-26T08:14:00+00:00"}'
        }
        println "✓ Version JSON prepared"
    }
}

// Зависимости задач
tasks.mergeJars.dependsOn setupMinecraftFiles
tasks.setupMinecraftFiles.mustRunAfter tasks.downloadClient
tasks.setupMinecraftFiles.mustRunAfter tasks.downloadServer
