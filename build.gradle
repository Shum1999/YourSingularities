buildscript {
    repositories {
        mavenCentral()
        maven {
            name = "forge"
            url = "https://maven.minecraftforge.net/"
        }
    }
    dependencies {
        classpath 'net.minecraftforge.gradle:ForgeGradle:2.1-SNAPSHOT'
    }
}

apply plugin: 'net.minecraftforge.gradle.forge'

version = "1.0"
group = "com.yoursingularities"
archivesBaseName = "yoursingularities"

minecraft {
    version = "1.7.10-10.13.4.1614-1.7.10"
    runDir = "run"
    mappings = "stable_12"
}

repositories {
    maven {
        name = "chickenbones"
        url = "https://chickenbones.net/maven"
    }
}

dependencies {
    compile "codechicken:NotEnoughItems:1.7.10-1.0.5.120:dev"
    compile "codechicken:CodeChickenCore:1.7.10-1.0.7.47:dev"
}

processResources {
    inputs.property "version", project.version
    inputs.property "mcversion", project.minecraft.version
    from(sourceSets.main.resources.srcDirs) {
        include 'mcmod.info'
        expand 'version':project.version, 'mcversion':project.minecraft.version
    }
    from(sourceSets.main.resources.srcDirs) {
        exclude 'mcmod.info'
    }
}

// Обходной путь для проблемы с extractUserdev
import java.util.concurrent.TimeUnit

tasks.extractUserdev {
    doLast {
        // Ждём пока файл загрузится
        def forgeDir = file("${gradle.gradleUserHomeDir}/caches/minecraft/net/minecraftforge/forge/${minecraft.version}/userdev")
        def classesJar = file("${forgeDir}/classes.jar")
        
        println "Waiting for Forge userdev files to be ready..."
        int retries = 0
        while (!classesJar.exists() && retries < 30) {
            Thread.sleep(1000)
            retries++
            if (retries % 5 == 0) {
                println "Still waiting... (${retries} seconds)"
            }
        }
        
        if (classesJar.exists()) {
            println "✅ Forge classes.jar found"
        } else {
            println "⚠️ Forge classes.jar not found after waiting"
        }
    }
}

// Также исправляем applyBinaryPatches
tasks.applyBinaryPatches {
    dependsOn tasks.extractUserdev
    doFirst {
        def forgeDir = file("${gradle.gradleUserHomeDir}/caches/minecraft/net/minecraftforge/forge/${minecraft.version}/userdev")
        def classesJar = file("${forgeDir}/classes.jar")
        
        if (!classesJar.exists()) {
            println "Forcing extractUserdev to run..."
            tasks.extractUserdev.execute()
            Thread.sleep(5000)
        }
    }
}
