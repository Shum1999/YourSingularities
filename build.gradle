buildscript {
    repositories {
        mavenCentral()
        maven {
            name = "forge"
            url = "https://maven.minecraftforge.net/"
        }
        maven {
            url = "https://plugins.gradle.org/m2/"
        }
    }
    dependencies {
        classpath 'net.minecraftforge.gradle:ForgeGradle:1.2-SNAPSHOT'
    }
}

apply plugin: 'forge'

version = "1.0"
group = "com.yoursingularities"
archivesBaseName = "yoursingularities"

minecraft {
    version = "1.7.10-10.13.4.1614-1.7.10"
    runDir = "eclipse"
}

repositories {
    maven {
        name = "chickenbones"
        url = "https://chickenbones.net/maven"
    }
}

dependencies {
    compile "codechicken:NotEnoughItems:1.7.10-1.0.5.120:dev"
    compile "codechicken:CodeChickenCore:1.7.10-1.0.7.47:dev"
}

processResources {
    inputs.property "version", project.version
    inputs.property "mcversion", project.minecraft.version
    from(sourceSets.main.resources.srcDirs) {
        include 'mcmod.info'
        expand 'version':project.version, 'mcversion':project.minecraft.version
    }
    from(sourceSets.main.resources.srcDirs) {
        exclude 'mcmod.info'
    }
}

// ========== FIXES FOR FORGEGRADLE 1.2 ==========
import java.nio.file.Files
import java.nio.file.StandardCopyOption

// Отключаем и переопределяем downloadClient
tasks.downloadClient {
    enabled = false
    doLast {
        def clientDir = new File(buildDir, "mcp/minecraft/client")
        clientDir.mkdirs()
        def targetFile = new File(clientDir, "minecraft.jar")
        
        def sourceJar = file("cache/1.7.10.jar")
        if (!sourceJar.exists()) {
            sourceJar = file("build/mcp/minecraft/client/minecraft.jar")
        }
        if (!sourceJar.exists()) {
            sourceJar = file("cache/downloaded.jar")
            sourceJar.parentFile.mkdirs()
            println "Downloading from Mojang..."
            def url = "https://launcher.mojang.com/v1/objects/4d2426c450addf63dee0d0735008caaef1ce496f/client.jar"
            new URL(url).withInputStream { input ->
                Files.copy(input, sourceJar.toPath(), StandardCopyOption.REPLACE_EXISTING)
            }
        }
        
        if (sourceJar.exists()) {
            Files.copy(sourceJar.toPath(), targetFile.toPath(), StandardCopyOption.REPLACE_EXISTING)
            println "✓ Client prepared"
        }
    }
}

// Отключаем downloadServer
tasks.downloadServer {
    enabled = false
    dependsOn tasks.downloadClient
    doLast {
        def serverDir = new File(buildDir, "mcp/minecraft/server")
        serverDir.mkdirs()
        def targetFile = new File(serverDir, "minecraft_server.jar")
        def clientJar = new File(buildDir, "mcp/minecraft/client/minecraft.jar")
        if (clientJar.exists()) {
            Files.copy(clientJar.toPath(), targetFile.toPath(), StandardCopyOption.REPLACE_EXISTING)
            println "✓ Server prepared"
        }
    }
}

// Перехватываем getVersionJson
tasks.getVersionJson {
    enabled = false
    doLast {
        def jsonDir = new File(gradle.gradleUserHomeDir, "caches/minecraft/net/minecraft/minecraft/1.7.10")
        jsonDir.mkdirs()
        def jsonFile = new File(jsonDir, "1.7.10.json")
        if (!jsonFile.exists()) {
            jsonFile.text = '{"id":"1.7.10","type":"release"}'
        }
    }
}

// Создаем файлы для mergeJars
task setupMinecraftFiles {
    doLast {
        def clientDir = new File(gradle.gradleUserHomeDir, "caches/minecraft/net/minecraft/minecraft/1.7.10")
        def serverDir = new File(gradle.gradleUserHomeDir, "caches/minecraft/net/minecraft/minecraft_server/1.7.10")
        clientDir.mkdirs()
        serverDir.mkdirs()
        
        def clientTarget = new File(clientDir, "minecraft-1.7.10.jar")
        def serverTarget = new File(serverDir, "minecraft_server-1.7.10.jar")
        
        def sourceJar = file("cache/1.7.10.jar")
        if (!sourceJar.exists()) {
            sourceJar = new File(buildDir, "mcp/minecraft/client/minecraft.jar")
        }
        
        if (sourceJar.exists()) {
            Files.copy(sourceJar.toPath(), clientTarget.toPath(), StandardCopyOption.REPLACE_EXISTING)
            Files.copy(sourceJar.toPath(), serverTarget.toPath(), StandardCopyOption.REPLACE_EXISTING)
            println "✓ Minecraft files set up for mergeJars"
        }
    }
}

tasks.mergeJars.dependsOn setupMinecraftFiles
tasks.setupMinecraftFiles.mustRunAfter tasks.downloadClient
tasks.setupMinecraftFiles.mustRunAfter tasks.downloadServer
