name: Build Forge 1.7.10 Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Download Minecraft JAR (backup method)
      run: |
        # Скачиваем заранее
        mkdir -p cache
        curl -L -o cache/1.7.10.jar \
          https://launcher.mojang.com/v1/objects/4d2426c450addf63dee0d0735008caaef1ce496f/client.jar
        echo "✅ Minecraft JAR downloaded to cache/1.7.10.jar"
        ls -lh cache/
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew build --stacktrace --no-daemon
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: YourSingularities
        path: build/libs/*.jar
        if-no-files-found: error
