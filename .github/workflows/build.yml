name: Build Forge 1.7.10 Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Verify local JAR
      run: |
        if [ -f cache/1.7.10.jar ]; then
          SIZE=$(stat -c%s "cache/1.7.10.jar")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "✅ Found local JAR: $SIZE_MB MB"
          if [ $SIZE -lt 8000000 ]; then
            echo "⚠️ Warning: JAR file is only $SIZE_MB MB (expected 8-10 MB)"
          fi
        else
          echo "❌ cache/1.7.10.jar not found!"
          exit 1
        fi
    
    - name: Setup Gradle cache
      run: |
        mkdir -p ~/.gradle/caches/minecraft/net/minecraft/minecraft/1.7.10/
        mkdir -p ~/.gradle/caches/minecraft/net/minecraft/minecraft_server/1.7.10/
        
        cp cache/1.7.10.jar ~/.gradle/caches/minecraft/net/minecraft/minecraft/1.7.10/minecraft-1.7.10.jar
        cp cache/1.7.10.jar ~/.gradle/caches/minecraft/net/minecraft/minecraft_server/1.7.10/minecraft_server-1.7.10.jar
        
        echo "✅ JAR copied to Gradle cache"
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew build --stacktrace --no-daemon
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: YourSingularities
        path: build/libs/*.jar
        if-no-files-found: error
