name: Build Forge 1.7.10 Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Download and verify Minecraft JAR
      run: |
        mkdir -p cache
        echo "Downloading Minecraft 1.7.10 JAR..."
        curl -L -o cache/1.7.10.jar \
          https://launcher.mojang.com/v1/objects/4d2426c450addf63dee0d0735008caaef1ce496f/client.jar
        
        # Проверяем, что файл валидный
        echo "Verifying JAR file..."
        if file cache/1.7.10.jar | grep -q "Zip archive"; then
          echo "✅ JAR file is valid"
          ls -lh cache/1.7.10.jar
        else
          echo "❌ JAR file is corrupt"
          file cache/1.7.10.jar
          exit 1
        fi
        
        # Вычисляем MD5 для проверки
        md5sum cache/1.7.10.jar
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Clean previous build
      run: ./gradlew clean --no-daemon || true
    
    - name: Build with Gradle
      run: ./gradlew build --stacktrace --no-daemon --info
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: YourSingularities
        path: build/libs/*.jar
        if-no-files-found: error
