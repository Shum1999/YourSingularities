name: Build Forge 1.7.10 Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Download Minecraft 1.7.10 JAR from alternative source
      run: |
        mkdir -p cache
        
        # Вариант 1: Используем библиотеку Minecraft (более надежно)
        echo "Trying to download from libraries.minecraft.net..."
        curl -L -o cache/1.7.10.jar \
          -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
          https://libraries.minecraft.net/net/minecraft/minecraft/1.7.10/minecraft-1.7.10.jar
        
        # Проверяем размер файла (должен быть около 8-10 MB)
        FILE_SIZE=$(stat -c%s "cache/1.7.10.jar")
        echo "Downloaded file size: $FILE_SIZE bytes"
        
        if [ $FILE_SIZE -lt 8000000 ]; then
          echo "File too small, trying alternative URL..."
          # Вариант 2: Используем версию с сервера Forge
          curl -L -o cache/1.7.10.jar \
            -H "User-Agent: Mozilla/5.0" \
            https://maven.minecraftforge.net/net/minecraft/minecraft/1.7.10/minecraft-1.7.10.jar
          
          FILE_SIZE=$(stat -c%s "cache/1.7.10.jar")
          echo "Second attempt file size: $FILE_SIZE bytes"
        fi
        
        # Проверяем, что это ZIP/JAR файл
        if file cache/1.7.10.jar | grep -q "Zip archive"; then
          echo "✅ Successfully downloaded valid JAR file"
          ls -lh cache/1.7.10.jar
        else
          echo "⚠️ Downloaded file is not a ZIP archive, showing first 20 lines:"
          head -20 cache/1.7.10.jar
          echo ""
          echo "Trying to download with wget and different options..."
          rm cache/1.7.10.jar
          wget -O cache/1.7.10.jar \
            --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://launcher.mojang.com/v1/objects/4d2426c450addf63dee0d0735008caaef1ce496f/client.jar
          
          if file cache/1.7.10.jar | grep -q "Zip archive"; then
            echo "✅ Successfully downloaded valid JAR with wget"
            ls -lh cache/1.7.10.jar
          else
            echo "❌ All download methods failed"
            cat cache/1.7.10.jar
            exit 1
          fi
        fi
        
        # Выводим MD5 для проверки (опционально)
        echo "MD5 hash:"
        md5sum cache/1.7.10.jar || true
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Clean previous build
      run: ./gradlew clean --no-daemon || true
    
    - name: Build with Gradle
      run: ./gradlew build --stacktrace --no-daemon
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: YourSingularities
        path: build/libs/*.jar
        if-no-files-found: error
