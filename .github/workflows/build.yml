name: Build Forge 1.7.10 Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Download Minecraft JAR from Forge Maven
      run: |
        mkdir -p cache
        
        echo "Downloading Minecraft 1.7.10 JAR from Forge Maven..."
        curl -L -o cache/1.7.10.jar \
          "https://maven.minecraftforge.net/net/minecraft/minecraft/1.7.10/minecraft-1.7.10.jar"
        
        # Проверяем размер
        SIZE=$(stat -c%s "cache/1.7.10.jar")
        echo "Downloaded file size: $SIZE bytes"
        
        if [ $SIZE -lt 8000000 ]; then
          echo "❌ File too small, download failed"
          exit 1
        fi
        
        echo "✅ Valid JAR downloaded"
        ls -lh cache/1.7.10.jar
        file cache/1.7.10.jar
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Clean previous builds
      run: ./gradlew clean --no-daemon || true
    
    - name: Build with Gradle
      run: ./gradlew build --stacktrace --no-daemon
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: YourSingularities
        path: build/libs/*.jar
        if-no-files-found: error
