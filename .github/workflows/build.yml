name: Build Forge 1.7.10 Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # позволяет запускать вручную

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Download Minecraft 1.7.10 JAR
      run: |
        # Создаем директорию для кеша Minecraft
        mkdir -p ~/.gradle/caches/minecraft/net/minecraft/minecraft/1.7.10/
        
        # Скачиваем с правильного URL Mojang
        echo "Downloading Minecraft 1.7.10 client from Mojang..."
        curl -L -o ~/.gradle/caches/minecraft/net/minecraft/minecraft/1.7.10/1.7.10.jar \
          https://launcher.mojang.com/v1/objects/4d2426c450addf63dee0d0735008caaef1ce496f/client.jar
        
        # Проверяем, что файл скачался
        if [ -f ~/.gradle/caches/minecraft/net/minecraft/minecraft/1.7.10/1.7.10.jar ]; then
          echo "✅ Minecraft JAR downloaded successfully"
          ls -lh ~/.gradle/caches/minecraft/net/minecraft/minecraft/1.7.10/
        else
          echo "❌ Failed to download Minecraft JAR"
          exit 1
        fi
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew build --stacktrace --no-daemon
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: YourSingularities
        path: build/libs/*.jar
        if-no-files-found: error
    
    - name: Upload JAR to release (if tagged)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build/libs/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
