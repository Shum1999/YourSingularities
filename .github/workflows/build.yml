name: Build Forge 1.7.10 Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Cache Minecraft JAR
      uses: actions/cache@v4
      id: minecraft-cache
      with:
        path: cache
        key: minecraft-1.7.10-jar-v2
    
    - name: Download Minecraft 1.7.10 JAR from mirror
      if: steps.minecraft-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p cache
        
        # Список зеркал для скачивания
        MIRRORS=(
          "https://bmclapi2.bangbang93.com/version/1.7.10/client"
          "https://download.mcverses.com/1.7.10/1.7.10.jar"
          "https://repo.huaweicloud.com/java/minecraft/versions/1.7.10/1.7.10.jar"
          "https://maven.minecraftforge.net/net/minecraft/minecraft/1.7.10/minecraft-1.7.10.jar"
        )
        
        for MIRROR in "${MIRRORS[@]}"; do
          echo "Trying: $MIRROR"
          curl -L -o cache/1.7.10.jar "$MIRROR" --max-time 30
          
          # Проверяем размер (должен быть > 1MB)
          if [ -f cache/1.7.10.jar ] && [ $(stat -c%s "cache/1.7.10.jar") -gt 1000000 ]; then
            if file cache/1.7.10.jar | grep -q "Zip archive"; then
              echo "✅ Successfully downloaded from $MIRROR"
              ls -lh cache/1.7.10.jar
              break
            fi
          fi
          echo "Failed from $MIRROR, trying next..."
          rm -f cache/1.7.10.jar
        done
        
        # Если всё ещё нет файла, создаем заглушку (не для реальной сборки, но для CI)
        if [ ! -f cache/1.7.10.jar ] || [ $(stat -c%s "cache/1.7.10.jar") -lt 1000000 ]; then
          echo "⚠️ Could not download real JAR, will try to use ForgeGradle's built-in download"
          # Удаляем кеш, чтобы ForgeGradle попробовал свой метод
          rm -rf cache/1.7.10.jar
          rm -rf ~/.gradle/caches/minecraft
        fi
    
    - name: Setup Gradle cache directories
      run: |
        # Если есть скачанный JAR, копируем его
        if [ -f cache/1.7.10.jar ] && [ $(stat -c%s "cache/1.7.10.jar") -gt 1000000 ]; then
          mkdir -p ~/.gradle/caches/minecraft/net/minecraft/minecraft/1.7.10/
          mkdir -p ~/.gradle/caches/minecraft/net/minecraft/minecraft_server/1.7.10/
          
          cp cache/1.7.10.jar ~/.gradle/caches/minecraft/net/minecraft/minecraft/1.7.10/minecraft-1.7.10.jar
          cp cache/1.7.10.jar ~/.gradle/caches/minecraft/net/minecraft/minecraft_server/1.7.10/minecraft_server-1.7.10.jar
          echo "✅ JAR files copied to Gradle cache"
        fi
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew build --stacktrace --no-daemon
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: YourSingularities
        path: build/libs/*.jar
        if-no-files-found: error
